services:
  notification:
    environment:
      - LANGUAGES=en,fr
      - SENTRY_DSN=${SENTRY_DSN:-}
      - NODE_ENV=production

  countryconfig:
    image: ${DOCKERHUB_ACCOUNT}/${DOCKERHUB_REPO}:${COUNTRY_CONFIG_VERSION}
    restart: unless-stopped
    secrets:
      - jwt-public-key.{{ts}}
    environment:
      - NODE_ENV=production
      - CHECK_INVALID_TOKEN=true
      - MONGO_URL=mongodb://mongo1/user-mgnt?replicaSet=rs0
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENDER_EMAIL_ADDRESS=${SENDER_EMAIL_ADDRESS}
      - REFERENCE_DATA_DATABASE_URL=${REFERENCE_DATA_DATABASE_URL}
      - ALERT_EMAIL=${ALERT_EMAIL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_SECURE=${SMTP_SECURE}
    deploy:
      replicas: 1
    networks:
      - overlay_net

  client:
    environment:
      - DECLARED_DECLARATION_SEARCH_QUERY_COUNT=100

  gateway:
    environment:
      - LANGUAGES=en,fr
      - SENTRY_DSN=${SENTRY_DSN:-}
      - TWO_FA_ENABLED=false
      - NODE_ENV=production
      - DISABLE_RATE_LIMIT=true

  auth:
    environment:
      - SENTRY_DSN=${SENTRY_DSN:-}
      - TWO_FA_ENABLED=false
      - NODE_ENV=production

  events:
    secrets:
      - jwt-public-key.{{ts}}
    environment:
      - NODE_ENV=production
      - TWO_FA_ENABLED=false
      - CERT_PUBLIC_KEY_PATH=/run/secrets/jwt-public-key.{{ts}}

  user-mgnt:
    environment:
      - SENTRY_DSN=${SENTRY_DSN:-}
      - NODE_ENV=production
      - DEFAULT_USER_PASSWORD=test

  documents:
    environment:
      - NODE_ENV=production

  traefik:
    command:
      # Use HTTP-01 challenge as the web server is publicly available
      # https://doc.traefik.io/traefik/https/acme/#httpchallenge
      # For DNS-01 challenge and manual certificates, check staging and production configurations
      - --certificatesresolvers.certResolver.acme.email=riku@opencrvs.org
      - --certificatesresolvers.certResolver.acme.storage=acme.json
      - --certificatesresolvers.certResolver.acme.caserver=https://acme-v02.api.letsencrypt.org/directory
      - --certificatesresolvers.certResolver.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.certResolver.acme.httpchallenge=true

      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --providers.docker
      - --providers.docker.swarmMode=true
      - --api.dashboard=true
      - --api.insecure=true
      - --log.level=WARNING
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --serverstransport.insecureskipverify=true
      - --entrypoints.websecure.address=:443
      - --accesslog=true
      - --accesslog.format=json
      - --ping=true

  postgres-on-update:
    image: postgres:17.6
    command: ['bash', '-c', 'bash /on-deploy.sh && bash /setup-analytics.sh && bash /setup-reference-data.sh']
    configs:
      - source: postgres-reference-data-on-deploy.{{ts}}
        target: /setup-reference-data.sh
    deploy:
      labels:
        - traefik.enable=false
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REFERENCE_DATA_POSTGRES_USER=${REFERENCE_DATA_POSTGRES_USER}
      - REFERENCE_DATA_POSTGRES_PASSWORD=${REFERENCE_DATA_POSTGRES_PASSWORD}
      - REFERENCE_DATA_DATABASE_URL=${REFERENCE_DATA_DATABASE_URL}
      - REFERENCE_DATA_EDITOR_USER=${REFERENCE_DATA_EDITOR_USER}
      - REFERENCE_DATA_EDITOR_PASSWORD=${REFERENCE_DATA_EDITOR_PASSWORD}
      - KEEP_ALIVE_SECONDS=10
    networks:
      - overlay_net

configs:
  postgres-reference-data-on-deploy.{{ts}}:
    file: /opt/opencrvs/infrastructure/postgres/setup-reference-data.sh